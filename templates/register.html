<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
radial-gradient(
circle at top left,
rgba(96,165,250,0.3),
transparent 30%
),

linear-gradient(
135deg,
#071426,
#0b2347,
#123c73,
#1d4ed8
);

color:white;

}

.register-box{

width:500px;

padding:50px;

text-align:center;

background:
rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border-radius:25px;

box-shadow:
0 10px 30px rgba(0,0,0,0.3);

}

.logo{

font-size:80px;

margin-bottom:10px;

}

h1{

margin-bottom:30px;

font-size:38px;

}

input{

width:100%;

padding:15px;

margin:10px 0;

border:none;

border-radius:12px;

font-size:16px;

}

button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#3b82f6;

}

a{

color:#93c5fd;

text-decoration:none;

}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">🚀</div>

<h1>Create Account</h1>

<form action="/register_user" method="POST">

<input
type="text"
name="username"
placeholder="Choose Username"
required>

<input
type="password"
name="password"
placeholder="Choose Password"
required>

<button type="submit">

Create Account

</button>

</form>

<br>

<a href="/login">

Back to Login

</a>

</div>

</body>
</html>
